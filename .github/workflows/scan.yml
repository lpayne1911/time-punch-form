name: Daily Play Scan

on:
  # ~30 min after the U.S. close, Mon-Fri (22:30 UTC). GitHub cron can lag.
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write   # commit the refreshed watchlist back to the repo
  pages: write      # publish the results to GitHub Pages
  id-token: write

# Share the Pages deployment lock with the other Pages workflow.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scanner
        run: python scanner/scan.py

      - name: Commit refreshed watchlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plays.json plays.md
          if git diff --cached --quiet; then
            echo "No watchlist changes to commit."
          else
            git commit -m "Daily play scan $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site (repository root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
